---
# pro (Ubuntu / WKS-00259) system layer — the half nix/home-manager can't own:
# system daemons, apt-only apps, PAM, sysctl. Run locally:
#
#   ansible-playbook pro.yml --ask-become-pass
#
# Tasks are tagged so you can run one slice, e.g. `--tags docker`.

- name: Pro system layer
  hosts: pro
  become: true

  vars:
    # local connection → controller == target, so the invoking login user is
    # whoever ran ansible-playbook (before become).
    target_user: "{{ lookup('env', 'USER') }}"
    docker_arch: >-
      {{ 'amd64' if ansible_architecture == 'x86_64'
         else ('arm64' if ansible_architecture == 'aarch64'
         else ansible_architecture) }}

  tasks:
    # --- Passwordless sudo for the automation user ----------
    # This playbook targets localhost and needs `become`. The fprintd PAM
    # module (enabled by the fprintd block below) sits first in common-auth and
    # blocks sudo for ~10s waiting on a finger swipe, which races out Ansible's
    # become-prompt timeout ("Timed out waiting for become success"). A NOPASSWD
    # rule makes become use `sudo -n`, short-circuiting PAM entirely so neither
    # password nor fingerprint is involved. validate= runs visudo so a malformed
    # rule can never lock out sudo. NB: the *first* run still authenticates
    # (via --ask-become-pass / swipe); subsequent runs are non-interactive.
    - name: Passwordless sudo for {{ target_user }}
      tags: [sudo]
      ansible.builtin.copy:
        dest: /etc/sudoers.d/10-pro-ansible-nopasswd
        content: "{{ target_user }} ALL=(ALL:ALL) NOPASSWD:ALL\n"
        owner: root
        group: root
        mode: "0440"
        validate: visudo -cf %s

    # --- Docker engine -------------------------------------
    - name: Docker engine
      tags: [docker]
      block:
        - name: Install Docker apt-repo prerequisites
          ansible.builtin.apt:
            name:
              - ca-certificates
              - curl
            state: present
            update_cache: true

        - name: Add Docker's official apt repository
          ansible.builtin.deb822_repository:
            name: docker
            types: [deb]
            uris: https://download.docker.com/linux/ubuntu
            signed_by: https://download.docker.com/linux/ubuntu/gpg
            suites: ["{{ ansible_distribution_release }}"]
            components: [stable]
            architectures: ["{{ docker_arch }}"]
            enabled: true
            state: present

        - name: Install Docker Engine, CLI, containerd and plugins
          ansible.builtin.apt:
            name:
              - docker-ce
              - docker-ce-cli
              - containerd.io
              - docker-buildx-plugin
              - docker-compose-plugin
            state: present
            update_cache: true

        - name: Enable and start the docker service
          ansible.builtin.systemd_service:
            name: docker
            enabled: true
            state: started

        - name: Add the login user to the docker group - {{ target_user }}
          ansible.builtin.user:
            name: "{{ target_user }}"
            groups: docker
            append: true
          # NB: re-login (or `newgrp docker`) for the group to take effect.

    # --- Fingerprint / fprintd (Goodix, goodixmoc — open libfprint, no TOD) ---
    # Installs the daemon + PAM module and enables the PAM profile. Enrollment
    # is interactive (per-user finger swipes) so it stays a manual post-step:
    #   fprintd-enroll && fprintd-verify
    # Lockout safety: after this runs, test sudo in a NEW terminal while keeping
    # a root shell open (sudo -k; sudo true). If enroll says "no devices
    # available", check the 27c6:xxxx Goodix USB id vs libfprint's device list.
    - name: Fingerprint authentication
      tags: [fprintd]
      block:
        - name: Install fprintd and the PAM module
          ansible.builtin.apt:
            name:
              - fprintd
              - libpam-fprintd
            state: present
            update_cache: true

        - name: Check whether the fprintd PAM profile is already enabled
          ansible.builtin.command: grep -q pam_fprintd /etc/pam.d/common-auth
          register: fprintd_pam
          changed_when: false
          failed_when: false

        - name: Enable the fprintd PAM profile
          ansible.builtin.command: pam-auth-update --enable fprintd
          when: fprintd_pam.rc != 0
          changed_when: true

    # --- xremap device access (macOS-style key remapping) -------------------
    # The xremap user service + keymap live in nix (modules/hosts/pro.nix), but
    # device access can't be granted from home-manager on a non-NixOS box.
    # xremap reads /dev/input/event* (input group) and writes /dev/uinput, which
    # ships root:root 0660. This block: puts the user in `input`, loads the
    # uinput module at boot, and makes its node group-owned by `input` so the
    # user service can open it without root. After the first run, log out/in so
    # the new group + the GNOME shell extension take effect.
    - name: xremap device access
      tags: [xremap]
      block:
        - name: Add {{ target_user }} to the input group
          ansible.builtin.user:
            name: "{{ target_user }}"
            groups: input
            append: true

        - name: Load the uinput module at boot
          ansible.builtin.copy:
            dest: /etc/modules-load.d/uinput.conf
            content: "uinput\n"
            owner: root
            group: root
            mode: "0644"

        - name: Load the uinput module now
          ansible.builtin.command: modprobe uinput
          changed_when: false

        # Same filename a manual setup already used on pro, so this codifies
        # that rule declaratively instead of leaving a second, duplicate file.
        # uaccess → logind grants the active-session user an ACL on the node.
        - name: udev rule — uinput node owned by the input group
          ansible.builtin.copy:
            dest: /etc/udev/rules.d/99-xremap-uinput.rules
            content: |
              KERNEL=="uinput", GROUP="input", MODE="0660", TAG+="uaccess", OPTIONS+="static_node=uinput"
            owner: root
            group: root
            mode: "0644"
          register: uinput_rule

        - name: Reload udev rules and re-trigger uinput
          ansible.builtin.shell: udevadm control --reload-rules && udevadm trigger
          when: uinput_rule.changed
          changed_when: true

    # --- Unprivileged user namespaces (nix Electron/Chromium sandbox) -------
    # Ubuntu's AppArmor blocks unprivileged userns → nix-built Chromium/Electron
    # can't use the namespace sandbox and can't use the SUID sandbox either
    # (read-only /nix/store can't hold a setuid-root helper), so they abort.
    # Re-enabling userns restores the namespace sandbox (keeps sandboxing on,
    # unlike --no-sandbox) and fixes ALL nix Chromium/Electron apps at once
    # (Obsidian, Bitwarden, Chrome). Codifies the manual /etc/sysctl.d drop-in.
    - name: Unprivileged user namespaces
      tags: [userns]
      block:
        - name: Allow unprivileged user namespaces (sysctl drop-in)
          ansible.builtin.copy:
            dest: /etc/sysctl.d/60-apparmor-userns.conf
            content: "kernel.apparmor_restrict_unprivileged_userns=0\n"
            owner: root
            group: root
            mode: "0644"
          register: userns_conf

        - name: Apply sysctl
          ansible.builtin.command: sysctl --system
          when: userns_conf.changed
          changed_when: true

    # --- Google Chrome ------------------------------------------------------
    # apt-only app (no nix module owns it); the dock pin google-chrome.desktop
    # is already wired in nix/dconf — this installs the actual browser. Mirrors
    # the docker block: deb822 repo (key auto-fetched via signed_by) + install.
    # NB: like the docker/fprintd tasks, `update_cache` runs `apt update`, which
    # currently fails on the broken GAR source on this host — clean that up for
    # the apt-based tasks to complete on a fresh run.
    - name: Google Chrome
      tags: [chrome]
      block:
        - name: Add Google Chrome's apt repository
          ansible.builtin.deb822_repository:
            name: google-chrome
            types: [deb]
            uris: https://dl.google.com/linux/chrome/deb
            signed_by: https://dl.google.com/linux/linux_signing_key.pub
            suites: [stable]
            components: [main]
            architectures: [amd64]
            enabled: true
            state: present

        - name: Install Google Chrome
          ansible.builtin.apt:
            name: google-chrome-stable
            state: present
            update_cache: true
